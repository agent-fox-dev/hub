[server]
port = 8080              # Listen port (0 = ephemeral, range: 0-65535)
bind = "0.0.0.0"         # Bind address
external_url = "http://localhost:8080"        # External URL for OAuth redirect validation
mount_point = "/api/v1"  # API route prefix
max_body_size = "1MB"    # Max request body (format: <int><KB|MB|GB>)

[database]
path = "afhub.db"        # SQLite database path (see resolution below)

[logging]
level = "info"           # trace, debug, info, warn, error, fatal, panic