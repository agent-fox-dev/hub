apiVersion: v1
kind: ConfigMap
metadata:
  name: af-hub-config
  labels:
    app.kubernetes.io/name: af-hub
    app.kubernetes.io/component: server
data:
  config.toml: |
    [server]
    port = 8080
    bind = "0.0.0.0"
    external_url = "http://localhost:8080"
    mount_point = "/api/v1"
    max_body_size = "1MB"

    [database]
    path = "afhub.db"

    [logging]
    level = "info"

    [[oauth.providers]]
    name = "github"
    client_id = "${GITHUB_CLIENT_ID}"
    client_secret = "${GITHUB_CLIENT_SECRET}"

    #[[oauth.providers]]
    #name = "google"
    #client_id = "${GOOGLE_CLIENT_ID}"
    #client_secret = "${GOOGLE_CLIENT_SECRET}"
